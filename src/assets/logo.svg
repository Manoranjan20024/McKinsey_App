    <rect x="6" y="30" width="4" height="60" fill="#F59E0B" /> <!-- Amber -->
    <rect x="12" y="20" width="4" height="80" fill="#EF4444" /> <!-- Red -->
    <rect x="18" y="10" width="4" height="100" fill="#8B5CF6" /> <!-- Violet -->
